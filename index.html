<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Controle de Contratos - DPJ</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* [O CSS permanece o mesmo que você enviou, omitido aqui para focar no funcionamento, 
           mas deve ser mantido no seu arquivo final] */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#080b10; --s1:#0e1219; --s2:#141a24; --s3:#1c2333;
          --b1:#1e2736; --b2:#27334a; --b3:#344060;
          --green:#00e5a0; --green2:#00ffb3; --blue:#38b6ff;
          --orange:#ff9f43; --red:#ff5272; --purple:#a78bfa;
          --text:#dce4f0; --text2:#8899b4; --text3:#4d6080;
          --ff:'Outfit',sans-serif; --fm:'IBM Plex Mono',monospace; --r:8px;
        }
        body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:14px;overflow-x:hidden}
        .shell{display:flex;height:100vh;overflow:hidden}
        .sidebar{width:240px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;transition:width .25s ease}
        .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
        .topbar{position:sticky;top:0;background:rgba(8,11,16,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
        .content{padding:24px;flex:1}
        /* ... (Mantenha todo o seu CSS de botões, tabelas e modais aqui) ... */
    </style>
</head>
<body>

<div class="shell">
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🌿</div>
            <div class="logo-text">
                <div class="logo-name">DPJ Poços</div>
                <div class="logo-sub">Gestão de Contratos</div>
            </div>
        </div>
        <nav class="nav">
            <button class="nav-item active" onclick="go('dashboard')"><span class="nav-icon">⬡</span>Dashboard</button>
            <button class="nav-item" onclick="go('cadastros')"><span class="nav-icon">📋</span>Contratos</button>
            <button class="nav-item" onclick="go('empenhos')"><span class="nav-icon">📑</span>Empenhos</button>
            <button class="nav-item" onclick="go('notas')"><span class="nav-icon">🧾</span>Notas Fiscais</button>
        </nav>
        <div class="sidebar-footer">
            <div class="conn-row">
                <div class="conn-dot" id="cdot"></div>
                <span class="conn-label" id="clabel">Verificando...</span>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="page-title"><span id="pt-label">Dashboard</span></div>
            <div class="topbar-right" id="topbar-right"></div>
        </div>
        <div class="content" id="content"></div>
    </main>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="m-title"></h2>
            <button onclick="closeModal()">✕</button>
        </div>
        <div id="m-body"></div>
    </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// CONFIGURAÇÃO DA API (ID CORRETA INSERIDA)
// ══════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwlkp3wffNcpp5FTikW5dHWWwo2F2h8LJddWZnQn8NDxGFzxPX9V4585naESgOUfTGNDw/exec";

let PAGE = 'dashboard';
let DATA = { cadastros:[], empenhos:[], notas:[] };
let LISTS = {};

// Inicialização
window.onload = async () => {
    await checkConn();
    go('dashboard');
};

async function checkConn() {
    try {
        const r = await fetch(`${API_URL}?action=getListas`);
        const j = await r.json();
        if (j.ok) {
            LISTS = j.data;
            document.getElementById('cdot').style.background = '#00e5a0';
            document.getElementById('clabel').textContent = 'Conectado';
        }
    } catch (e) {
        document.getElementById('cdot').style.background = '#ff5272';
        document.getElementById('clabel').textContent = 'Erro de Conexão';
    }
}

// Navegação
function go(page) {
    PAGE = page;
    document.getElementById('pt-label').textContent = page.toUpperCase();
    if (page === 'dashboard') renderDash();
    if (page === 'cadastros') renderCads();
    // Adicione as outras chamadas conforme necessário
}

// Chamada Genérica da API
async function call(action, data = {}, method = 'GET') {
    const url = method === 'GET' 
        ? `${API_URL}?action=${action}&` + new URLSearchParams(data)
        : API_URL;
    
    const opts = method === 'POST' 
        ? { method: 'POST', body: JSON.stringify({action, ...data}) }
        : {};

    try {
        const r = await fetch(url, opts);
        return await r.json();
    } catch (e) {
        console.error("Erro na API:", e);
        return { ok: false };
    }
}

// Exemplo de Renderização de Contratos (Corrigido)
async function renderCads() {
    const cont = document.getElementById('content');
    cont.innerHTML = '<p>Carregando contratos...</p>';
    
    const res = await call('getCadastros');
    if (res.ok) {
        DATA.cadastros = res.data;
        cont.innerHTML = `
            <button class="btn btn-primary" onclick="openCadForm()">＋ Novo Contrato</button>
            <table style="width:100%; margin-top:20px; border-collapse: collapse;">
                <thead>
                    <tr style="text-align:left; border-bottom:1fr solid var(--b2)">
                        <th>Contrato</th>
                        <th>Contratada</th>
                        <th>Saldo (R$)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${DATA.cadastros.map(c => `
                        <tr>
                            <td>${c.contrato}</td>
                            <td>${c.contratada}</td>
                            <td>${c.saldo.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</td>
                            <td>${c.status}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }
}

// Formulário de Cadastro (Fechamento Corrigido)
function openCadForm(row = null) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('m-title').textContent = row ? 'Editar' : 'Novo Contrato';
    document.getElementById('m-body').innerHTML = `
        <div style="display:grid; gap:15px;">
            <label>Contrato</label>
            <input id="f-contrato" value="${row?.contrato || ''}" style="padding:8px; background:#141a24; border:1px solid #27334a; color:#fff;">
            
            <label>Contratada</label>
            <input id="f-contratada" value="${row?.contratada || ''}" style="padding:8px; background:#141a24; border:1px solid #27334a; color:#fff;">
            
            <label>Objeto</label>
            <textarea id="f-objeto" style="padding:8px; background:#141a24; border:1px solid #27334a; color:#fff; min-height:80px;">${row?.objeto || ''}</textarea>
            
            <button class="btn btn-primary" onclick="saveCad()">Salvar</button>
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        </div>
    `;
}

function closeModal() {
    document.getElementById('overlay').classList.remove('open');
}

async function renderDash() {
    const res = await call('getDashboard');
    if(res.ok) {
        const c = res.data.cards;
        document.getElementById('content').innerHTML = `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                <div style="background:var(--s1); padding:20px; border-radius:8px; border-left:4px solid var(--green)">
                    <h3>Ativos</h3>
                    <p style="font-size:24px">${c.contratosAtivos}</p>
                </div>
                <div style="background:var(--s1); padding:20px; border-radius:8px; border-left:4px solid var(--orange)">
                    <h3>Vencendo</h3>
                    <p style="font-size:24px">${c.contratosVencendo}</p>
                </div>
                <div style="background:var(--s1); padding:20px; border-radius:8px; border-left:4px solid var(--red)">
                    <h3>Total Pago</h3>
                    <p style="font-size:20px">${c.totalPago.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</p>
                </div>
            </div>
        `;
    }
}
</script>
</body>
</html>
