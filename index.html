<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Controle de Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;
  --s1:#0e1219;
  --s2:#141a24;
  --s3:#1c2333;
  --b1:#1e2736;
  --b2:#27334a;
  --b3:#344060;
  --green:#00e5a0;
  --green2:#00ffb3;
  --blue:#38b6ff;
  --orange:#ff9f43;
  --red:#ff5272;
  --purple:#a78bfa;
  --text:#dce4f0;
  --text2:#8899b4;
  --text3:#4d6080;
  --ff:'Outfit',sans-serif;
  --fm:'IBM Plex Mono',monospace;
  --r:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s ease;
  z-index:20;
}
.sidebar.collapsed{width:64px}

.logo{
  display:flex;align-items:center;gap:12px;
  padding:20px 18px;
  border-bottom:1px solid var(--b1);
  min-height:72px;
}
.logo-icon{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,var(--green),var(--blue));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.logo-text{overflow:hidden;white-space:nowrap}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

.sidebar-toggle{
  margin:8px 12px 0;
  background:none;border:1px solid var(--b2);border-radius:var(--r);
  color:var(--text3);cursor:pointer;padding:6px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:14px;
}
.sidebar-toggle:hover{border-color:var(--green);color:var(--green)}

.nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;margin-top:4px}
.nav-section-label{
  font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;
  padding:10px 8px 4px;white-space:nowrap;overflow:hidden;
}
.sidebar.collapsed .nav-section-label,.sidebar.collapsed .logo-text,.sidebar.collapsed .nav-text{opacity:0;width:0;overflow:hidden}

.nav-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 10px;
  border:none;border-radius:var(--r);
  background:none;color:var(--text2);
  font-family:var(--ff);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:left;
  white-space:nowrap;position:relative;
  margin-bottom:1px;
}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.active{background:rgba(0,229,160,.1);color:var(--green)}
.nav-item.active .nav-icon{color:var(--green)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;flex-shrink:0;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:600;
  border-radius:10px;padding:1px 6px;
  min-width:18px;text-align:center;
}
.nav-badge.green{background:rgba(0,229,160,.2);color:var(--green)}

.sidebar-footer{
  padding:14px;border-top:1px solid var(--b1);
  display:flex;flex-direction:column;gap:8px;
}
.conn-row{display:flex;align-items:center;gap:8px;padding:0 2px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:all .3s}
.conn-dot.ok{background:var(--green);box-shadow:0 0 10px var(--green)}
.conn-dot.err{background:var(--red);box-shadow:0 0 10px var(--red)}
.conn-label{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden}
.sidebar.collapsed .conn-label{display:none}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:10;
  background:rgba(8,11,16,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);
  padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;flex-shrink:0;
}
.page-title{
  font-size:18px;font-weight:700;letter-spacing:-.3px;
  display:flex;align-items:center;gap:10px;
}
.page-title-icon{font-size:20px}
.topbar-right{display:flex;align-items:center;gap:8px}

/* ── CONTENT ── */
.content{padding:24px;flex:1}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--r);border:none;
  font-family:var(--ff);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1;
}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,229,160,.3)}
.btn-ghost{background:var(--s3);color:var(--text);border:1px solid var(--b2)}
.btn-ghost:hover{border-color:var(--green);color:var(--green)}
.btn-danger{background:rgba(255,82,114,.12);color:var(--red);border:1px solid rgba(255,82,114,.25)}
.btn-danger:hover{background:rgba(255,82,114,.22)}
.btn-blue{background:rgba(56,182,255,.12);color:var(--blue);border:1px solid rgba(56,182,255,.25)}
.btn-blue:hover{background:rgba(56,182,255,.22)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-icon{padding:7px;border-radius:var(--r)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;gap:14px;margin-bottom:20px}
.kpi-grid-3{grid-template-columns:repeat(3,1fr)}
.kpi-grid-4{grid-template-columns:repeat(4,1fr)}

.kpi{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:12px;padding:18px 20px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
}
.kpi:hover{border-color:var(--b3);transform:translateY(-2px)}
.kpi::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--green);border-radius:12px 12px 0 0;
}
.kpi.orange::after{background:var(--orange)}
.kpi.red::after{background:var(--red)}
.kpi.blue::after{background:var(--blue)}
.kpi.purple::after{background:var(--purple)}
.kpi-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.kpi-val{font-size:26px;font-weight:800;margin:6px 0 2px;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-icon{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:28px;opacity:.12;
}

/* ── SECTION ── */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.section-actions{display:flex;gap:8px}

/* ── CHART CARD ── */
.chart-grid{display:grid;gap:16px;margin-bottom:20px}
.chart-grid-3{grid-template-columns:repeat(3,1fr)}
.chart-grid-2{grid-template-columns:2fr 1fr}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px}
.chart-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px}
canvas{max-height:220px!important}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);
  padding:8px 14px;flex:1;min-width:200px;transition:border-color .15s;
}
.search-box:focus-within{border-color:var(--green)}
.search-box input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:var(--ff);font-size:13px;width:100%;
}
.search-box .ico{color:var(--text3);font-size:14px;flex-shrink:0}
.filter-select{
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);
  color:var(--text);font-family:var(--ff);font-size:13px;
  padding:8px 12px;outline:none;cursor:pointer;transition:border-color .15s;
}
.filter-select:focus{border-color:var(--green)}
.filter-select option{background:var(--s2)}

/* ── TABLE ── */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:1}
thead tr{background:var(--s2);border-bottom:1px solid var(--b2)}
th{
  padding:10px 14px;text-align:left;
  font-size:10px;color:var(--text3);letter-spacing:1.2px;
  text-transform:uppercase;font-weight:600;white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s;
}
th:hover{color:var(--text)}
th.sorted-asc::after{content:' ↑';color:var(--green)}
th.sorted-desc::after{content:' ↓';color:var(--green)}
tbody tr{border-bottom:1px solid var(--b1);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{
  padding:10px 14px;font-size:12px;
  overflow:hidden;text-overflow:ellipsis;max-width:240px;
  white-space:nowrap;
}
td.mono{font-family:var(--fm);font-size:11px}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;
  white-space:nowrap;
}
.bg{background:rgba(0,229,160,.1);color:var(--green)}
.bo{background:rgba(255,159,67,.1);color:var(--orange)}
.br{background:rgba(255,82,114,.1);color:var(--red)}
.bb{background:rgba(56,182,255,.1);color:var(--blue)}
.bp{background:rgba(167,139,250,.1);color:var(--purple)}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0}
.page-info{font-size:11px;color:var(--text3)}
.page-btns{display:flex;gap:6px;align-items:center}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  z-index:100;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:16px;width:min(680px,96vw);max-height:92vh;
  overflow-y:auto;padding:28px;
  transform:scale(.95) translateY(10px);transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 24px 80px rgba(0,0,0,.6);
}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--b1);
}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.modal-subtitle{font-size:12px;color:var(--text3);margin-top:2px}
.modal-close{
  background:var(--s3);border:1px solid var(--b2);
  border-radius:8px;color:var(--text2);cursor:pointer;
  width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .15s;
}
.modal-close:hover{color:var(--text);border-color:var(--b3)}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg3{grid-template-columns:repeat(3,1fr)}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{
  background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);
  padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:13px;
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--green);box-shadow:0 0 0 3px rgba(0,229,160,.08);
}
.field input.err,.field select.err{border-color:var(--red)!important}
.field-err{font-size:10px;color:var(--red);margin-top:2px}
.field select option{background:var(--s2)}
.field textarea{resize:vertical;min-height:72px}
.modal-footer{
  display:flex;gap:10px;justify-content:flex-end;
  margin-top:24px;padding-top:18px;border-top:1px solid var(--b1);
}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{
  background:var(--s2);border:1px solid var(--b2);
  border-radius:10px;padding:12px 14px;
  display:flex;align-items:center;gap:10px;font-size:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:toastIn .2s cubic-bezier(.34,1.4,.64,1);
}
.toast.ok  {border-left:3px solid var(--green)}
.toast.err {border-left:3px solid var(--red)}
.toast.warn{border-left:3px solid var(--orange)}
.toast-icon{font-size:16px;flex-shrink:0}
.toast-close{margin-left:auto;cursor:pointer;color:var(--text3);background:none;border:none;font-size:14px;padding:0 2px}
@keyframes toastIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:6px;height:1em}
@keyframes skel{to{background-position:-200% 0}}
.skel-row{height:44px;margin-bottom:1px;border-radius:0}
.skel-kpi{height:90px;border-radius:12px}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty p{font-size:13px}
.empty small{font-size:11px;margin-top:4px}

/* ── SETTINGS ── */
.settings-wrap{max-width:620px;display:flex;flex-direction:column;gap:16px}
.setting-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:22px}
.setting-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.setting-card p{font-size:12px;color:var(--text3);margin-bottom:16px;line-height:1.7}
.step-list{list-style:none;counter-reset:steps;display:flex;flex-direction:column;gap:10px}
.step-list li{
  counter-increment:steps;
  display:flex;align-items:flex-start;gap:12px;
  font-size:12px;color:var(--text2);
}
.step-list li::before{
  content:counter(steps);
  width:22px;height:22px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--b2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--green);
}
.tag{background:var(--s3);border:1px solid var(--b2);border-radius:5px;padding:1px 7px;font-family:var(--fm);font-size:11px;color:var(--blue);display:inline-block}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-top:8px}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:11px}
.progress-bar-bg{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;background:var(--green);transition:width .6s ease}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.kpi-grid-4{grid-template-columns:repeat(2,1fr)}.chart-grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){
  .kpi-grid-3{grid-template-columns:1fr 1fr}
  .chart-grid-2,.chart-grid-3{grid-template-columns:1fr}
  .sidebar{width:64px}
  .sidebar .logo-text,.sidebar .nav-section-label,.sidebar .nav-text,.sidebar .conn-label{display:none}
  .sidebar.collapsed{width:64px}
}
@media(max-width:600px){
  .kpi-grid-3,.kpi-grid-4{grid-template-columns:1fr}
  .form-grid,.fg3{grid-template-columns:1fr}
  .toolbar{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div class="shell">

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-text">
      <div class="logo-name">Contratos</div>
      <div class="logo-sub">Sistema de Gestão</div>
    </div>
  </div>

  <button class="sidebar-toggle" id="sb-toggle" title="Recolher menu">⇄</button>

  <nav class="nav">
    <div class="nav-section-label">Navegação</div>
    <button class="nav-item active" id="nav-dashboard" onclick="go('dashboard')">
      <span class="nav-icon">⬡</span><span class="nav-text">Dashboard</span>
    </button>
    <button class="nav-item" id="nav-cadastros" onclick="go('cadastros')">
      <span class="nav-icon">📋</span><span class="nav-text">Contratos</span>
      <span class="nav-badge green" id="badge-cadastros">—</span>
    </button>
    <button class="nav-item" id="nav-empenhos" onclick="go('empenhos')">
      <span class="nav-icon">📑</span><span class="nav-text">Empenhos</span>
      <span class="nav-badge green" id="badge-empenhos">—</span>
    </button>
    <button class="nav-item" id="nav-notas" onclick="go('notas')">
      <span class="nav-icon">🧾</span><span class="nav-text">Notas Fiscais</span>
      <span class="nav-badge" id="badge-notas" style="display:none">!</span>
    </button>
    <div class="nav-section-label" style="margin-top:8px">Sistema</div>
    <button class="nav-item" id="nav-settings" onclick="go('settings')">
      <span class="nav-icon">⚙</span><span class="nav-text">Configurações</span>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="conn-row">
      <div class="conn-dot" id="cdot"></div>
      <span class="conn-label" id="clabel">Verificando…</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="go('settings')" style="width:100%">
      ⚙ <span class="nav-text">Configurar API</span>
    </button>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <div class="page-title">
      <span class="page-title-icon" id="pt-icon">⬡</span>
      <span id="pt-label">Dashboard</span>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div class="content" id="content"></div>
</main>
</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="overlay" onclick="closeIfBack(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-subtitle" id="m-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<!-- ══ TOASTS ══ -->
<div class="toast-wrap" id="toasts"></div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let API_URL = localStorage.getItem('api_url') || '';
let PAGE    = 'dashboard';
let CHARTS  = {};
let LISTS   = {};

// Per-page data caches
let DATA = { cadastros:[], empenhos:[], notas:[] };

// Filter/sort/page state
let ST = {
  cadastros: { q:'', status:'', sort:'contrato', dir:1, page:1 },
  empenhos:  { q:'', sort:'nEmpenho', dir:1, page:1 },
  notas:     { q:'', sort:'data', dir:-1, page:1 }
};
const PER = 25;

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
async function call(action, data={}, method='GET') {
  if (!API_URL) { toast('Configure a URL da API nas Configurações.','warn'); go('settings'); return null; }
  try {
    let url = API_URL, opts = {};
    if (method==='GET') {
      const qs = Object.entries(data).map(([k,v])=>`&${k}=${encodeURIComponent(v)}`).join('');
      url = `${API_URL}?action=${action}${qs}`;
    } else {
      opts = { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action,...data}) };
    }
    const r = await fetch(url, opts);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Erro na API');
    return j;
  } catch(e) {
    toast('Erro: '+e.message,'err');
    return null;
  }
}

async function checkConn() {
  if (!API_URL) { setConn(false); return; }
  try {
    const r = await fetch(`${API_URL}?action=getListas`);
    const j = await r.json();
    setConn(j.ok);
    if (j.ok) LISTS = j.data;
  } catch { setConn(false); }
}
function setConn(ok) {
  document.getElementById('cdot').className  = 'conn-dot '+(ok?'ok':'err');
  document.getElementById('clabel').textContent = ok ? 'Conectado' : 'Sem conexão';
}

function drawCads() {
  const s = ST.cadastros;
  let d = [...DATA.cadastros];

  // Filter
  if (s.q) {
    const q = s.q.toLowerCase();
    d = d.filter(r=>
      (r.contrato||'').toLowerCase().includes(q)||
      (r.contratada||'').toLowerCase().includes(q)||
      (r.objeto||'').toLowerCase().includes(q)||
      (r.chaveUnica||'').toLowerCase().includes(q)
    );
  }
  if (s.status) d = d.filter(r=>r.status===s.status);

  // Sort
  d.sort((a,b)=>{
    let av=a[s.sort]||'', bv=b[s.sort]||'';
    if (!isNaN(av)&&!isNaN(bv)){av=Number(av);bv=Number(bv);}
    return av<bv ? -s.dir : av>bv ? s.dir : 0;
  });

  const total = d.length;
  const pg    = Math.max(1,Math.ceil(total/PER));
  if (s.page>pg) s.page=pg;
  const slice = d.slice((s.page-1)*PER, s.page*PER);

    <table>

        ${th('contrato','Contrato',s)}&nbsp;
        ${th('item','Item',s)}
        ${th('contratada','Contratada',s)}
        ${th('objeto','Objeto',s)}
        ${th('qtdDisponivel','Qtd Disp.',s)}
        ${th('valorUnitario','Val. Unit.',s)}
        ${th('saldo','Saldo (R$)',s)}
        ${th('fim','Vencimento',s)}
        ${th('status','Status',s)}
        <th>Alerta</th>
        <th>Ações</th>
      </tr></thead>
      <tbody>
        ${!slice.length
          ? `<tr><td colspan="11">${empty('Nenhum contrato encontrado','Ajuste os filtros ou cadastre um novo')}</td></tr>`

              <td class="mono">${brl(r.saldo)}</td>

              <td>${stbadge(r.status)}</td>
              <td>${alertbadge(r.alerta)}</td>
              <td>

async function saveCad(isEdit, rowNum) {
  const required = [['f-contrato','Contrato'],['f-contratada','Contratada'],['f-fim','Vencimento']];

  const p = {
    contrato:v('f-contrato'), item:v('f-item'), contratada:v('f-contratada'),

    qtdEmpenhada:v('f-qe'), qtdUtilizada:isEdit?v('f-qu'):0,
    un:v('f-un'), valorUnitario:v('f-vu')
  };
  if (isEdit) p._row=rowNum;
  const res = await call(isEdit?'updateEmpenho':'addEmpenho',p,'POST');
  if (res) { toast(res.message,'ok'); closeModal(); renderEmps(); }
}

// ══════════════════════════════════════════════════════════════
// NOTAS
// ══════════════════════════════════════════════════════════════
async function renderNotas() {
  const el = document.getElementById('content');
  el.innerHTML = skelTable(10);
  document.getElementById('topbar-right').innerHTML = `
    <button class="btn btn-ghost" onclick="exportCSV('notas')">↓ CSV</button>
    <button class="btn btn-ghost" onclick="renderNotas()">↻</button>
    <button class="btn btn-primary" onclick="openNotaForm()">＋ Nova Nota</button>
  `;
  const res = await call('getNotas');
  if (!res) return;
  DATA.notas = res.data;
  ST.notas.page = 1;
  drawNotas();
}

function drawNotas() {
  const s = ST.notas;
  let d = [...DATA.notas];

  if (s.q) {
    const q = s.q.toLowerCase();
    d = d.filter(r=>
      String(r.notaFiscal).toLowerCase().includes(q)||
      String(r.nEmpenho).toLowerCase().includes(q)||
      (r.contratada||'').toLowerCase().includes(q)||
      (r.chave||'').toLowerCase().includes(q)
    );
  }

  d.sort((a,b)=>{
    let av=a[s.sort]||'', bv=b[s.sort]||'';
    if (!isNaN(av)&&!isNaN(bv)){av=Number(av);bv=Number(bv);}
    return av<bv?-s.dir:av>bv?s.dir:0;
  });

  const total=d.length, pg=Math.max(1,Math.ceil(total/PER));
  if (s.page>pg) s.page=pg;
  const slice=d.slice((s.page-1)*PER,s.page*PER);
  const dups = d.filter(r=>r.duplicidade).length;

  document.getElementById('content').innerHTML = `
  ${dups>0?`<div style="background:rgba(255,159,67,.1);border:1px solid rgba(255,159,67,.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--orange)">
    ⚠️ <strong>${dups}</strong> nota(s) com possível duplicidade detectada. Verifique as linhas marcadas.
  </div>`:''}
  <div class="toolbar">
    <div class="search-box">
      <span class="ico">🔍</span>
      <input placeholder="Buscar por NF, empenho, contratada, chave…"
        value="${s.q}" oninput="ST.notas.q=this.value;ST.notas.page=1;drawNotas()"/>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        ${th('data','Data',s,'st-notas')}
        ${th('nEmpenho','Nº Empenho',s,'st-notas')}
        ${th('notaFiscal','Nota Fiscal',s,'st-notas')}
        ${th('contratada','Contratada',s,'st-notas')}
        ${th('chave','Chave',s,'st-notas')}
        ${th('qtdRecebida','Qtd Receb.',s,'st-notas')}
        ${th('valorTotal','Valor Total',s,'st-notas')}
        ${th('saldoEmpenho','Saldo Emp.',s,'st-notas')}
        <th>Dup?</th>
        <th>Ações</th>
      </tr></thead>
      <tbody>
        ${!slice.length
          ? `<tr><td colspan="10">${empty('Nenhuma nota fiscal encontrada')}</td></tr>`
          : slice.map(r=>`<tr ${r.duplicidade?'style="background:rgba(255,159,67,.04)"':''}>
              <td class="mono">${r.data||'—'}</td>
              <td class="mono">${r.nEmpenho||'—'}</td>
              <td class="mono">${r.notaFiscal||'—'}</td>
              <td title="${r.contratada}">${trunc(r.contratada,22)}</td>
              <td class="mono" title="${r.chave}">${trunc(r.chave,26)}</td>
              <td class="mono">${fnum(r.qtdRecebida)}</td>
              <td class="mono">${brl(r.valorTotal)}</td>
              <td class="mono">${brl(r.saldoEmpenho)}</td>
              <td>${r.duplicidade?'<span class="badge bo">⚠ Dup</span>':'<span style="color:var(--text3)">—</span>'}</td>
              <td>
                <button class="btn btn-ghost btn-xs" onclick='openNotaForm(${J(r)})'>✏</button>
                <button class="btn btn-danger btn-xs" onclick='delConfirm("nota",${r._row},"NF ${r.notaFiscal}")'>🗑</button>
              </td>
            </tr>`).join('')}
      </tbody>
    </table>
  </div>
  ${pager(total,s,'ST.notas','drawNotas')}
  `;
  thSort('st-notas',s,drawNotas);
}

function openNotaForm(row=null) {
  const e=!!row;
  mOpen(
    e?'Editar Nota Fiscal':'Lançar Nota Fiscal',
    e?`NF: ${row.notaFiscal}`:'Registre uma nova nota fiscal',
    `<div class="form-grid">
      <div class="field"><label>Data *</label><input id="f-data" type="date" value="${row?.data||today()}"/></div>
      <div class="field"><label>Nota Fiscal *</label><input id="f-nf" value="${row?.notaFiscal||''}"/></div>
      <div class="field"><label>Nº Empenho *</label>
        <input id="f-ne" value="${row?.nEmpenho||''}" list="dl-ne"/>
        <datalist id="dl-ne">${(LISTS.nEmpenhos||[]).map(x=>`<option value="${x}">`).join('')}</datalist>
      </div>
      <div class="field"><label>Contratada</label>
        <input id="f-ct" value="${row?.contratada||''}" list="dl-ct3"/>
        <datalist id="dl-ct3">${(LISTS.contratadas||[]).map(x=>`<option value="${x}">`).join('')}</datalist>
      </div>
      <div class="field full"><label>Chave do Contrato</label>
        <input id="f-chave" value="${row?.chave||''}" list="dl-chave2" placeholder="ex: 127_2025 - Item nº - 1"/>
        <datalist id="dl-chave2">${(LISTS.chaves||[]).map(x=>`<option value="${x}">`).join('')}</datalist>
      </div>
      <div class="field full"><label>Objeto</label><textarea id="f-objeto">${row?.objeto||''}</textarea></div>
      <div class="field"><label>Qtd Empenhada</label><input id="f-qe" type="number" step="0.001" value="${row?.qtdEmpenhada||0}"/></div>
      <div class="field"><label>Qtd Recebida</label><input id="f-qr" type="number" step="0.001" value="${row?.qtdRecebida||0}"/></div>
      <div class="field"><label>Valor Unitário (R$)</label><input id="f-vu" type="number" step="0.01" value="${row?.valorUnitario||0}"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNota(${e},${row?._row||0})">💾 Salvar</button>
    </div>`
  );
}

async function saveNota(isEdit, rowNum) {
  if (!validate([['f-nf','Nota Fiscal'],['f-ne','Nº Empenho'],['f-data','Data']])) return;
  const p={
    data:v('f-data'), notaFiscal:v('f-nf'), nEmpenho:v('f-ne'),
    contratada:v('f-ct'), chave:v('f-chave'), objeto:v('f-objeto'),
    qtdEmpenhada:v('f-qe'), qtdRecebida:v('f-qr'), valorUnitario:v('f-vu')
  };
  if (isEdit) p._row=rowNum;
  const res = await call(isEdit?'updateNota':'addNota',p,'POST');
  if (res) {
    const type = res.message.includes('⚠️') ? 'warn' : 'ok';
    toast(res.message,type);
    closeModal(); renderNotas();
  }
}

function delConfirm(type, row, label) {
  mOpen('Confirmar Exclusão',`Esta ação é permanente e não pode ser desfeita.`,
    `<div style="background:rgba(255,82,114,.08);border:1px solid rgba(255,82,114,.2);border-radius:8px;padding:14px 16px;margin-bottom:20px">
      <div style="font-size:12px;color:var(--text2)">Você está prestes a excluir:</div>
      <div style="font-size:14px;font-weight:700;color:var(--red);margin-top:4px">${label}</div>
    </div>
    <div class="modal-footer" style="border-top:none;margin-top:0;padding-top:0">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete('${type}',${row})">🗑 Excluir definitivamente</button>
    </div>`
  );
}

async function doDelete(type, row) {
  const actions={cadastro:'deleteCadastro',empenho:'deleteEmpenho',nota:'deleteNota'};
  const refresh={cadastro:renderCads, empenho:renderEmps, nota:renderNotas};
  const res = await call(actions[type],{_row:row},'POST');
  if (res) { toast(res.message,'ok'); closeModal(); refresh[type](); }
}

async function saveConfig() {
  API_URL = document.getElementById('cfg-url').value.trim();
  localStorage.setItem('api_url',API_URL);
  toast('URL salva!','ok');
  await checkConn();
}

async function testConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  if (!url) { toast('Informe a URL primeiro.','warn'); return; }
  try {
    const r = await fetch(`${url}?action=getListas`);
    const j = await r.json();
    j.ok ? toast('✓ Conexão OK! API respondendo corretamente.','ok')
          : toast('API respondeu com erro: '+j.error,'err');

// ══════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════
function mOpen(title, sub, body) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-sub').textContent   = sub;
  document.getElementById('m-body').innerHTML    = body;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBack(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function toast(msg, type='ok') {
  const icons={ok:'✓',err:'✕',warn:'⚠'};
  const el = document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]}</span><span>${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),4500);
}

// ══════════════════════════════════════════════════════════════
// SORTING
// ══════════════════════════════════════════════════════════════
function th(key, label, state, group='') {
  const cls = state.sort===key ? (state.dir===1?'sorted-asc':'sorted-desc') : '';
  return `<th class="${cls}" data-sort="${key}" data-group="${group}" onclick="sortBy('${key}','${group}')">${label}</th>`;
}

function sortBy(key, group) {
  const map={'st-cadastros':{state:'ST.cadastros',fn:'drawCads'},'st-empenhos':{state:'ST.empenhos',fn:'drawEmps'},'st-notas':{state:'ST.notas',fn:'drawNotas'}};
  if (!map[group]) return;
  const st = eval(map[group].state);
  if (st.sort===key) st.dir*=-1; else { st.sort=key; st.dir=1; }
  st.page=1;
  eval(map[group].fn+'()');
}

function thSort(group, state, fn) {
  // Headers already wired via onclick
}

// ══════════════════════════════════════════════════════════════
// PAGINATION
// ══════════════════════════════════════════════════════════════
function pager(total, s, stRef, fnName) {
  const pg = Math.max(1,Math.ceil(total/PER));
  return `<div class="pagination">
    <span class="page-info">${total} registro(s) · Página ${s.page} de ${pg}</span>
    <div class="page-btns">
      <button class="btn btn-ghost btn-sm" onclick="${stRef}.page=1;${fnName}()" ${s.page<=1?'disabled':''}>«</button>
      <button class="btn btn-ghost btn-sm" onclick="${stRef}.page--;${fnName}()" ${s.page<=1?'disabled':''}>‹</button>
      <button class="btn btn-ghost btn-sm" onclick="${stRef}.page++;${fnName}()" ${s.page>=pg?'disabled':''}>›</button>
      <button class="btn btn-ghost btn-sm" onclick="${stRef}.page=${pg};${fnName}()" ${s.page>=pg?'disabled':''}>»</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// CSV EXPORT
// ══════════════════════════════════════════════════════════════
function exportCSV(type) {
  const d = DATA[type];
  if (!d||!d.length) { toast('Sem dados para exportar.','warn'); return; }
  const keys = Object.keys(d[0]).filter(k=>k!=='_row');
  const csv  = [keys.join(','), ...d.map(r=>keys.map(k=>{
    const val = r[k]??'';
    return typeof val==='string'&&val.includes(',') ? `"${val}"` : val;
  }).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+csv);
  a.download=`${type}_${today()}.csv`; a.click();
  toast(`${d.length} registros exportados.`,'ok');
}

// ══════════════════════════════════════════════════════════════
// FORM VALIDATION
// ══════════════════════════════════════════════════════════════
function validate(fields) {
  let ok = true;
  fields.forEach(([id,label])=>{
    const el=document.getElementById(id);
    if (!el) return;
    const val = el.value.trim();
    if (!val) {
      el.classList.add('err');
      el.addEventListener('input',()=>el.classList.remove('err'),{once:true});
      toast(`Campo "${label}" é obrigatório.`,'warn');
      ok=false;
    }
  });
  return ok;
}

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function v(id)         { return document.getElementById(id)?.value||''; }
function J(o)          { return JSON.stringify(o).replace(/'/g,"\\'"); }
function esc(s)        { return String(s||'').replace(/"/g,'&quot;'); }
function trunc(s,n)    { s=s||''; return s.length>n?s.slice(0,n)+'…':s; }
function today()       { return new Date().toISOString().slice(0,10); }
function fnum(v)       { const n=Number(v); return isNaN(n)?'—':n.toLocaleString('pt-BR',{maximumFractionDigits:3}); }
function brl(v)        {
  const n=Number(v);
  if (isNaN(n)||v===''||v===null||v===undefined) return '—';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function stbadge(s) {
  const m={'Vigente':'bg','Encerrado':'br','Suspenso':'bo','Em renovação':'bb'};
  return `<span class="badge ${m[s]||'bp'}">${s||'—'}</span>`;
}
function alertbadge(a) {
  if (!a) return '<span style="color:var(--text3)">—</span>';
  const cls = a.includes('✅')?'bg': a.includes('⚠')||a.includes('🔴')?'bo':'br';
  return `<span class="badge ${cls}">${a}</span>`;
}
function empty(msg,sub='') {
  return `<div class="empty"><div class="empty-icon">🔍</div><p>${msg}</p>${sub?`<small>${sub}</small>`:''}</div>`;
}
function skelTable(cols) {
  const rows = Array(8).fill(`<tr>${Array(cols).fill('<td><div class="skel" style="height:12px;width:80%"></div></td>').join('')}</tr>`).join('');
  return `<div style="height:44px;display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div class="skel" style="height:36px;width:280px;border-radius:8px"></div>
    <div class="skel" style="height:36px;width:140px;border-radius:8px"></div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>${Array(cols).fill('<th><div class="skel" style="height:10px;width:60px"></div></th>').join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
